<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Letterboxd Roulette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <img src="icons/favicon.svg" alt="" class="logo" />
    <h1>Review<span class="accent">Roulette</span></h1>
    <p class="subtitle">Random reviews from your watchlist.</p>
  </div>

  <form id="watchlistForm">
    <label class="field-label" for="usernameInput">Letterboxd Username</label>
    <input id="usernameInput" type="text" placeholder="e.g. noahbaumbach" autocomplete="off" autocapitalize="none" spellcheck="false" />
    <button type="submit">Spin the Reviews &rarr;</button>
  </form>

  <label class="toggle-row">
    <input type="checkbox" id="hoursModeToggle">
    Show runtimes in hours on Letterboxd pages
  </label>

  <div id="spinner" style="display: none;"><div class="spinner"></div></div>
  <div id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
