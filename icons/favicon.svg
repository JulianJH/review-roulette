<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#12201e"/>

  <g transform="translate(32 32) scale(1.25) translate(-32 -27)">
    <!-- roulette wheel -->
    <circle cx="32" cy="27" r="19" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="1.5"/>

    <!-- alternating wheel pockets, 12 thin wedges like a real roulette rim -->
    <path d="M32 27 L32 8 A19 19 0 0 1 41.5 10.55 Z" fill="#e08a1e"/>
    <path d="M32 27 L41.5 10.55 A19 19 0 0 1 48.45 17.5 Z" fill="#3a3a3a"/>
    <path d="M32 27 L48.45 17.5 A19 19 0 0 1 51 27 Z" fill="#e08a1e"/>
    <path d="M32 27 L51 27 A19 19 0 0 1 48.45 36.5 Z" fill="#3a3a3a"/>
    <path d="M32 27 L48.45 36.5 A19 19 0 0 1 41.5 43.45 Z" fill="#e08a1e"/>
    <path d="M32 27 L41.5 43.45 A19 19 0 0 1 32 46 Z" fill="#3a3a3a"/>
    <path d="M32 27 L32 46 A19 19 0 0 1 22.5 43.45 Z" fill="#e08a1e"/>
    <path d="M32 27 L22.5 43.45 A19 19 0 0 1 15.55 36.5 Z" fill="#3a3a3a"/>
    <path d="M32 27 L15.55 36.5 A19 19 0 0 1 13 27 Z" fill="#e08a1e"/>
    <path d="M32 27 L13 27 A19 19 0 0 1 15.55 17.5 Z" fill="#3a3a3a"/>
    <path d="M32 27 L15.55 17.5 A19 19 0 0 1 22.5 10.55 Z" fill="#e08a1e"/>
    <path d="M32 27 L22.5 10.55 A19 19 0 0 1 32 8 Z" fill="#3a3a3a"/>

    <!-- pocket dividers -->
    <g stroke="#12201e" stroke-width="0.6">
      <line x1="32" y1="27" x2="32" y2="8"/>
      <line x1="32" y1="27" x2="41.5" y2="10.55"/>
      <line x1="32" y1="27" x2="48.45" y2="17.5"/>
      <line x1="32" y1="27" x2="51" y2="27"/>
      <line x1="32" y1="27" x2="48.45" y2="36.5"/>
      <line x1="32" y1="27" x2="41.5" y2="43.45"/>
      <line x1="32" y1="27" x2="32" y2="46"/>
      <line x1="32" y1="27" x2="22.5" y2="43.45"/>
      <line x1="32" y1="27" x2="15.55" y2="36.5"/>
      <line x1="32" y1="27" x2="13" y2="27"/>
      <line x1="32" y1="27" x2="15.55" y2="17.5"/>
      <line x1="32" y1="27" x2="22.5" y2="10.55"/>
    </g>

    <!-- roulette balls, in letterboxd's trio colors -->
    <circle cx="34.1" cy="15.2" r="2.2" fill="#ff8000"/>
    <circle cx="47.3" cy="29.7" r="2.2" fill="#00e054"/>
    <circle cx="20.3" cy="38.7" r="2.2" fill="#40bcf4"/>

    <!-- roulette pointer -->
    <path d="M32 9.5 L34.8 5.5 L29.2 5.5 Z" fill="#e8e8e8"/>

    <!-- hub: review speech bubble with text lines -->
    <circle cx="32" cy="27" r="9" fill="#12201e" stroke="#2e2e2e" stroke-width="1.2"/>
    <path d="M24.5 21.5h15a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-9.2l-3.6 3.2v-3.2h-2.2a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2Z" fill="#e8e8e8"/>
    <line x1="26.3" y1="25.3" x2="37.7" y2="25.3" stroke="#12201e" stroke-width="1.1"/>
    <line x1="26.3" y1="27.8" x2="34" y2="27.8" stroke="#12201e" stroke-width="1.1"/>
  </g>
</svg>
