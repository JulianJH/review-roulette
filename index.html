<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letterboxd Review Picker</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; text-align: center; }
    .review-card { border: 1px solid #ccc; padding: 12px; margin: 12px 0; border-radius: 8px; }
    .review-card p { text-align: left; }
    .review-card button { margin-top: 10px; }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #ccc;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 10px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <h1>Letterboxd Review Picker</h1>
  <form id="watchlistForm">
    <input id="username" type="text" placeholder="Enter Letterboxd username" required />
    <button type="submit">Load Watchlist</button>
  </form>

  <div id="spinner" style="display: none;">
    <div class="spinner"></div>
  </div>
  <div id="reviews"></div>

  <script src="main.js"></script>
</body>
</html>
